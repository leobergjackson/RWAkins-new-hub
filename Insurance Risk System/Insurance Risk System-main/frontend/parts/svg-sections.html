<!-- ============================================================
     SVG Section Header Icons — Claymorphism 3D Style
     Dark-theme DeFi Dashboard · CoverFi
     Palette: Gold #F0B90B · Blue #1E9FFF · Gray #848E9C · Dark #181C21
     ============================================================ -->


<!-- ─── 1. IRS Radar / Brain Analytics ─── -->
<svg id="svg-irs-radar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="radar-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A3038"/>
      <stop offset="100%" stop-color="#181C21"/>
    </linearGradient>
    <linearGradient id="radar-ring-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E9FFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1E9FFF" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="radar-fill-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0B90B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F0B90B" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="radar-dot-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#F0B90B"/>
    </linearGradient>
    <filter id="radar-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <filter id="radar-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Base circle -->
  <circle cx="24" cy="24" r="21" rx="4" fill="url(#radar-bg-grad)" filter="url(#radar-shadow)"/>
  <!-- Concentric rings -->
  <circle cx="24" cy="24" r="16" fill="none" stroke="url(#radar-ring-grad)" stroke-width="0.7"/>
  <circle cx="24" cy="24" r="11" fill="none" stroke="url(#radar-ring-grad)" stroke-width="0.5"/>
  <circle cx="24" cy="24" r="6" fill="none" stroke="url(#radar-ring-grad)" stroke-width="0.4"/>
  <!-- 5 axis lines (72 deg apart) -->
  <line x1="24" y1="24" x2="24" y2="7" stroke="#848E9C" stroke-width="0.5" stroke-opacity="0.5"/>
  <line x1="24" y1="24" x2="40.2" y2="18.1" stroke="#848E9C" stroke-width="0.5" stroke-opacity="0.5"/>
  <line x1="24" y1="24" x2="34" y2="37.3" stroke="#848E9C" stroke-width="0.5" stroke-opacity="0.5"/>
  <line x1="24" y1="24" x2="14" y2="37.3" stroke="#848E9C" stroke-width="0.5" stroke-opacity="0.5"/>
  <line x1="24" y1="24" x2="7.8" y2="18.1" stroke="#848E9C" stroke-width="0.5" stroke-opacity="0.5"/>
  <!-- Radar polygon fill -->
  <polygon points="24,10 36,19 32,34 16,34 12,19" fill="url(#radar-fill-grad)" stroke="#F0B90B" stroke-width="0.6" stroke-opacity="0.6" stroke-linejoin="round"/>
  <!-- Dots on axes -->
  <circle cx="24" cy="10" r="2" fill="url(#radar-dot-grad)" filter="url(#radar-glow)"/>
  <circle cx="36" cy="19" r="2" fill="url(#radar-dot-grad)" filter="url(#radar-glow)"/>
  <circle cx="32" cy="34" r="1.8" fill="url(#radar-dot-grad)" filter="url(#radar-glow)"/>
  <circle cx="16" cy="34" r="1.8" fill="url(#radar-dot-grad)" filter="url(#radar-glow)"/>
  <circle cx="12" cy="19" r="2" fill="url(#radar-dot-grad)" filter="url(#radar-glow)"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="1.5" fill="#1E9FFF" filter="url(#radar-glow)"/>
</svg>


<!-- ─── 2. Pool Vault / Safe ─── -->
<svg id="svg-pool-vault" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="vault-body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A4250"/>
      <stop offset="100%" stop-color="#1E2228"/>
    </linearGradient>
    <linearGradient id="vault-door-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A5568"/>
      <stop offset="100%" stop-color="#2D3748"/>
    </linearGradient>
    <linearGradient id="vault-dial-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#C99A08"/>
    </linearGradient>
    <linearGradient id="vault-handle-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0B90B"/>
      <stop offset="100%" stop-color="#C99A08"/>
    </linearGradient>
    <linearGradient id="vault-rim-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E9FFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1E9FFF" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="vault-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <filter id="vault-inner-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Vault body -->
  <rect x="6" y="8" width="36" height="34" rx="5" ry="5" fill="url(#vault-body-grad)" filter="url(#vault-shadow)"/>
  <!-- Vault door inset -->
  <rect x="10" y="12" width="28" height="26" rx="3" ry="3" fill="url(#vault-door-grad)" stroke="url(#vault-rim-grad)" stroke-width="1"/>
  <!-- Bolt lines top/bottom -->
  <circle cx="14" cy="16" r="1.2" fill="#848E9C" fill-opacity="0.6"/>
  <circle cx="34" cy="16" r="1.2" fill="#848E9C" fill-opacity="0.6"/>
  <circle cx="14" cy="34" r="1.2" fill="#848E9C" fill-opacity="0.6"/>
  <circle cx="34" cy="34" r="1.2" fill="#848E9C" fill-opacity="0.6"/>
  <!-- Dial / combination lock -->
  <circle cx="24" cy="23" r="6" fill="none" stroke="#848E9C" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="24" cy="23" r="4" fill="url(#vault-dial-grad)" filter="url(#vault-inner-shadow)"/>
  <circle cx="24" cy="23" r="1.5" fill="#181C21"/>
  <!-- Dial tick marks -->
  <line x1="24" y1="17.5" x2="24" y2="19" stroke="#181C21" stroke-width="0.6"/>
  <line x1="24" y1="27" x2="24" y2="28.5" stroke="#181C21" stroke-width="0.6"/>
  <line x1="18.5" y1="23" x2="20" y2="23" stroke="#181C21" stroke-width="0.6"/>
  <line x1="28" y1="23" x2="29.5" y2="23" stroke="#181C21" stroke-width="0.6"/>
  <!-- Handle bar -->
  <rect x="18" y="31" width="12" height="3" rx="1.5" ry="1.5" fill="url(#vault-handle-grad)" filter="url(#vault-inner-shadow)"/>
</svg>


<!-- ─── 3. Events Lightning Bolt ─── -->
<svg id="svg-events-bolt" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bolt-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#222830"/>
      <stop offset="100%" stop-color="#181C21"/>
    </linearGradient>
    <linearGradient id="bolt-fill-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#F0B90B"/>
      <stop offset="100%" stop-color="#C99A08"/>
    </linearGradient>
    <linearGradient id="bolt-highlight-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="bolt-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <filter id="bolt-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#1E9FFF" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="24" cy="24" r="21" fill="url(#bolt-bg-grad)" filter="url(#bolt-shadow)"/>
  <!-- Blue glow aura -->
  <circle cx="24" cy="24" r="14" fill="none" stroke="#1E9FFF" stroke-width="0.8" stroke-opacity="0.2"/>
  <!-- Lightning bolt -->
  <path d="M27 6 L16 24 L22 24 L19 42 L34 20 L27 20 Z"
        fill="url(#bolt-fill-grad)" stroke="#C99A08" stroke-width="0.5"
        stroke-linejoin="round" filter="url(#bolt-glow)"/>
  <!-- Highlight overlay on bolt top half -->
  <path d="M27 6 L16 24 L22 24 L27 20 Z"
        fill="url(#bolt-highlight-grad)"/>
</svg>


<!-- ─── 4. Purchase Shield (36x36) ─── -->
<svg id="svg-purchase-shield" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <defs>
    <linearGradient id="shield-fill-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#F0B90B"/>
      <stop offset="100%" stop-color="#C99A08"/>
    </linearGradient>
    <linearGradient id="shield-inner-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shield-edge-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C99A08"/>
      <stop offset="100%" stop-color="#8B6E08"/>
    </linearGradient>
    <filter id="shield-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <filter id="shield-inner-glow">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Shield shape -->
  <path d="M18 3 L30 8 L30 17 C30 25 24 31 18 33 C12 31 6 25 6 17 L6 8 Z"
        fill="url(#shield-fill-grad)" stroke="url(#shield-edge-grad)" stroke-width="0.8"
        stroke-linejoin="round" filter="url(#shield-shadow)"/>
  <!-- Inner highlight -->
  <path d="M18 5 L28 9 L28 17 C28 24 23 29 18 31 C13 29 8 24 8 17 L8 9 Z"
        fill="url(#shield-inner-grad)"/>
  <!-- Checkmark -->
  <polyline points="12.5,18 16,22 23.5,13.5"
            fill="none" stroke="#181C21" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"
            filter="url(#shield-inner-glow)"/>
</svg>


<!-- ─── 5. Certificate Ribbon / Seal ─── -->
<svg id="svg-cert-ribbon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="cert-seal-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#F0B90B"/>
      <stop offset="100%" stop-color="#C99A08"/>
    </linearGradient>
    <linearGradient id="cert-inner-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cert-ribbon-l-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0B90B"/>
      <stop offset="100%" stop-color="#8B6E08"/>
    </linearGradient>
    <linearGradient id="cert-ribbon-r-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C99A08"/>
      <stop offset="100%" stop-color="#6B5206"/>
    </linearGradient>
    <linearGradient id="cert-star-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#181C21" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#181C21"/>
    </linearGradient>
    <filter id="cert-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <filter id="cert-ribbon-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Ribbon tails (behind seal) -->
  <path d="M17 28 L13 44 L18 40 L21 44 L22 30"
        fill="url(#cert-ribbon-l-grad)" filter="url(#cert-ribbon-shadow)"/>
  <path d="M31 28 L35 44 L30 40 L27 44 L26 30"
        fill="url(#cert-ribbon-r-grad)" filter="url(#cert-ribbon-shadow)"/>
  <!-- Seal outer scalloped edge -->
  <path d="M24 4
           L26.5 8 L31 6.5 L31.5 11.5 L36.5 12.5 L35 17 L39 20.5
           L36 24 L39 27.5 L35 31 L36.5 35.5 L31.5 36.5 L31 41.5
           L26.5 40 L24 44 L21.5 40 L17 41.5 L16.5 36.5 L11.5 35.5
           L13 31 L9 27.5 L12 24 L9 20.5 L13 17 L11.5 12.5
           L16.5 11.5 L17 6.5 L21.5 8 Z"
        fill="url(#cert-seal-grad)" filter="url(#cert-shadow)"/>
  <!-- Inner ring -->
  <circle cx="24" cy="24" r="10" fill="none" stroke="#181C21" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Inner highlight disc -->
  <circle cx="24" cy="24" r="9" fill="url(#cert-inner-grad)"/>
  <!-- Star in center -->
  <path d="M24 16 L25.8 21.2 L31.2 21.2 L26.8 24.6 L28.4 30
           L24 26.8 L19.6 30 L21.2 24.6 L16.8 21.2 L22.2 21.2 Z"
        fill="url(#cert-star-grad)"/>
</svg>
