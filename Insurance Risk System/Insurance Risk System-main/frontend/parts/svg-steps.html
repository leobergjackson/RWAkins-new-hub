<!-- ============================================================
     CoverFi — "How It Works" Step Icons
     Claymorphism 3D inline SVGs  |  60x60 viewBox  |  No emoji
     ============================================================ -->

<!-- ─── 1. REGISTER — Clipboard with checklist ─────────────── -->
<svg id="svg-step-register" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="s1-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5D76E"/>
      <stop offset="100%" stop-color="#F0B90B"/>
    </linearGradient>
    <linearGradient id="s1-clip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C49A08"/>
      <stop offset="100%" stop-color="#A37F06"/>
    </linearGradient>
    <linearGradient id="s1-sheet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
    <filter id="s1-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="s1-inner" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- board body -->
  <rect x="13" y="8" width="34" height="46" rx="5" fill="url(#s1-body)" filter="url(#s1-shadow)"/>
  <!-- clip top -->
  <rect x="21" y="4" width="18" height="8" rx="3" fill="url(#s1-clip)" filter="url(#s1-inner)"/>
  <!-- paper -->
  <rect x="18" y="16" width="24" height="32" rx="2.5" fill="url(#s1-sheet)"/>
  <!-- form lines -->
  <rect x="22" y="22" width="16" height="2.2" rx="1" fill="#CACACA"/>
  <rect x="22" y="29" width="16" height="2.2" rx="1" fill="#CACACA"/>
  <rect x="22" y="36" width="12" height="2.2" rx="1" fill="#CACACA"/>
  <!-- checkmark on first line -->
  <polyline points="22,22.5 24,25 28,20" fill="none" stroke="#0ECB81" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>


<!-- ─── 2. SCORE — Bar chart with trend ────────────────────── -->
<svg id="svg-step-score" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="s2-bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1E9FFF"/>
      <stop offset="100%" stop-color="#6DC8FF"/>
    </linearGradient>
    <linearGradient id="s2-bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1888DD"/>
      <stop offset="100%" stop-color="#1E9FFF"/>
    </linearGradient>
    <linearGradient id="s2-bar3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#F0B90B"/>
      <stop offset="100%" stop-color="#F5D76E"/>
    </linearGradient>
    <linearGradient id="s2-bar4" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#D4A20A"/>
      <stop offset="100%" stop-color="#F0B90B"/>
    </linearGradient>
    <filter id="s2-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="s2-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#F0B90B" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- background plate -->
  <rect x="6" y="6" width="48" height="48" rx="10" fill="#1F2630" filter="url(#s2-shadow)"/>
  <!-- bars -->
  <rect x="12" y="36" width="7" height="12" rx="2" fill="url(#s2-bar1)"/>
  <rect x="21" y="28" width="7" height="20" rx="2" fill="url(#s2-bar2)"/>
  <rect x="30" y="22" width="7" height="26" rx="2" fill="url(#s2-bar3)"/>
  <rect x="39" y="14" width="7" height="34" rx="2" fill="url(#s2-bar4)"/>
  <!-- trend line -->
  <polyline points="15.5,34 24.5,26 33.5,20 42.5,12" fill="none" stroke="#F0B90B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#s2-glow)"/>
  <!-- axis -->
  <line x1="10" y1="49" x2="50" y2="49" stroke="#848E9C" stroke-width="1.2" stroke-linecap="round"/>
</svg>


<!-- ─── 3. COVERAGE — Shield with protection waves ─────────── -->
<svg id="svg-step-coverage" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="s3-shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5D76E"/>
      <stop offset="50%" stop-color="#F0B90B"/>
      <stop offset="100%" stop-color="#C49A08"/>
    </linearGradient>
    <linearGradient id="s3-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF2C4"/>
      <stop offset="100%" stop-color="#F0B90B"/>
    </linearGradient>
    <filter id="s3-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="3" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <filter id="s3-wave" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.2" flood-color="#F0B90B" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- shield body -->
  <path d="M30 6 L50 16 L50 30 C50 44 30 54 30 54 C30 54 10 44 10 30 L10 16 Z"
        fill="url(#s3-shield)" filter="url(#s3-shadow)" stroke="#C49A08" stroke-width="0.8"/>
  <!-- inner highlight -->
  <path d="M30 12 L44 20 L44 30 C44 40 30 48 30 48 C30 48 16 40 16 30 L16 20 Z"
        fill="url(#s3-inner)" opacity="0.35"/>
  <!-- protection waves -->
  <path d="M22 28 Q14 24 14 18" fill="none" stroke="#F0B90B" stroke-width="1.8" stroke-linecap="round" opacity="0.6" filter="url(#s3-wave)"/>
  <path d="M18 34 Q8 28 8 20" fill="none" stroke="#F0B90B" stroke-width="1.4" stroke-linecap="round" opacity="0.4" filter="url(#s3-wave)"/>
  <path d="M38 28 Q46 24 46 18" fill="none" stroke="#F0B90B" stroke-width="1.8" stroke-linecap="round" opacity="0.6" filter="url(#s3-wave)"/>
  <path d="M42 34 Q52 28 52 20" fill="none" stroke="#F0B90B" stroke-width="1.4" stroke-linecap="round" opacity="0.4" filter="url(#s3-wave)"/>
  <!-- dome arc -->
  <path d="M16 26 Q30 6 44 26" fill="none" stroke="#FFF2C4" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>


<!-- ─── 4. LIQUIDITY — Vault building with coin ────────────── -->
<svg id="svg-step-liquidity" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="s4-bldg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0A8B4"/>
      <stop offset="100%" stop-color="#6B7380"/>
    </linearGradient>
    <linearGradient id="s4-roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A8FE0"/>
      <stop offset="100%" stop-color="#1E9FFF"/>
    </linearGradient>
    <linearGradient id="s4-pillar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8CDD4"/>
      <stop offset="50%" stop-color="#E8ECF0"/>
      <stop offset="100%" stop-color="#A0A8B4"/>
    </linearGradient>
    <linearGradient id="s4-coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5D76E"/>
      <stop offset="100%" stop-color="#D4A20A"/>
    </linearGradient>
    <filter id="s4-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="s4-coinSh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#D4A20A" flood-opacity="0.45"/>
    </filter>
  </defs>
  <!-- base/steps -->
  <rect x="8" y="44" width="44" height="5" rx="2" fill="#5A6270"/>
  <!-- building body -->
  <rect x="12" y="20" width="36" height="25" rx="3" fill="url(#s4-bldg)" filter="url(#s4-shadow)"/>
  <!-- roof / pediment -->
  <polygon points="10,22 30,8 50,22" fill="url(#s4-roof)" stroke="#1888DD" stroke-width="0.6"/>
  <!-- pillars -->
  <rect x="17" y="24" width="4" height="19" rx="1.5" fill="url(#s4-pillar)"/>
  <rect x="28" y="24" width="4" height="19" rx="1.5" fill="url(#s4-pillar)"/>
  <rect x="39" y="24" width="4" height="19" rx="1.5" fill="url(#s4-pillar)"/>
  <!-- door -->
  <rect x="25" y="34" width="10" height="9" rx="4.5" fill="#181C21"/>
  <!-- coin going in -->
  <ellipse cx="30" cy="12" rx="5.5" ry="4" fill="url(#s4-coin)" filter="url(#s4-coinSh)" stroke="#C49A08" stroke-width="0.5"/>
  <!-- coin inner ring -->
  <ellipse cx="30" cy="12" rx="3.2" ry="2.2" fill="none" stroke="#C49A08" stroke-width="0.7"/>
</svg>


<!-- ─── 5. DEFAULT — Warning triangle with lightning ────────── -->
<svg id="svg-step-default" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="s5-tri" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#CC3333"/>
    </linearGradient>
    <linearGradient id="s5-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFAAAA"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <linearGradient id="s5-bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D76E"/>
      <stop offset="100%" stop-color="#F0B90B"/>
    </linearGradient>
    <filter id="s5-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="s5-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#FF4444" flood-opacity="0.4"/>
    </filter>
    <filter id="s5-boltGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#F0B90B" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- triangle -->
  <path d="M30 6 L54 50 Q55 53 52 53 L8 53 Q5 53 6 50 Z"
        fill="url(#s5-tri)" filter="url(#s5-shadow)" stroke="#AA2222" stroke-width="0.6"/>
  <!-- inner highlight -->
  <path d="M30 14 L47 47 L13 47 Z" fill="url(#s5-inner)" opacity="0.25"/>
  <!-- lightning bolt -->
  <path d="M32 20 L26 33 L31 33 L27 46 L37 30 L31.5 30 L35 20 Z"
        fill="url(#s5-bolt)" filter="url(#s5-boltGlow)" stroke="#C49A08" stroke-width="0.4"/>
</svg>


<!-- ─── 6. PAYOUT — Coins distributed with arrows ──────────── -->
<svg id="svg-step-payout" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="s6-coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5D76E"/>
      <stop offset="100%" stop-color="#D4A20A"/>
    </linearGradient>
    <linearGradient id="s6-coinDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A20A"/>
      <stop offset="100%" stop-color="#A37F06"/>
    </linearGradient>
    <linearGradient id="s6-arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ECB81"/>
      <stop offset="100%" stop-color="#0AA868"/>
    </linearGradient>
    <filter id="s6-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="s6-coinGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#F0B90B" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- coin stack (center) -->
  <!-- bottom coin -->
  <ellipse cx="30" cy="32" rx="10" ry="5" fill="url(#s6-coinDark)" filter="url(#s6-shadow)"/>
  <ellipse cx="30" cy="31" rx="10" ry="5" fill="url(#s6-coin)"/>
  <!-- middle coin -->
  <ellipse cx="30" cy="28" rx="10" ry="5" fill="url(#s6-coinDark)"/>
  <ellipse cx="30" cy="27" rx="10" ry="5" fill="url(#s6-coin)"/>
  <!-- top coin -->
  <ellipse cx="30" cy="24" rx="10" ry="5" fill="url(#s6-coinDark)"/>
  <ellipse cx="30" cy="23" rx="10" ry="5" fill="url(#s6-coin)" filter="url(#s6-coinGlow)"/>
  <!-- inner ring on top coin -->
  <ellipse cx="30" cy="23" rx="6" ry="3" fill="none" stroke="#C49A08" stroke-width="0.8"/>

  <!-- distribution arrows -->
  <!-- top-left -->
  <line x1="22" y1="20" x2="10" y2="10" stroke="url(#s6-arrow)" stroke-width="2.2" stroke-linecap="round"/>
  <polygon points="8,8 13,9 10,13" fill="#0ECB81"/>
  <!-- small destination coin -->
  <ellipse cx="8" cy="8" rx="4" ry="2.5" fill="url(#s6-coin)" opacity="0.8"/>

  <!-- top-right -->
  <line x1="38" y1="20" x2="50" y2="10" stroke="url(#s6-arrow)" stroke-width="2.2" stroke-linecap="round"/>
  <polygon points="52,8 47,9 50,13" fill="#0ECB81"/>
  <ellipse cx="52" cy="8" rx="4" ry="2.5" fill="url(#s6-coin)" opacity="0.8"/>

  <!-- bottom-left -->
  <line x1="22" y1="32" x2="10" y2="48" stroke="url(#s6-arrow)" stroke-width="2.2" stroke-linecap="round"/>
  <polygon points="8,50 13,47 9,44" fill="#0ECB81"/>
  <ellipse cx="8" cy="51" rx="4" ry="2.5" fill="url(#s6-coin)" opacity="0.8"/>

  <!-- bottom-right -->
  <line x1="38" y1="32" x2="50" y2="48" stroke="url(#s6-arrow)" stroke-width="2.2" stroke-linecap="round"/>
  <polygon points="52,50 47,47 51,44" fill="#0ECB81"/>
  <ellipse cx="52" cy="51" rx="4" ry="2.5" fill="url(#s6-coin)" opacity="0.8"/>
</svg>
