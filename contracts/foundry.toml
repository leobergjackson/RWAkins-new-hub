[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
# Allow the deploy script to write deployed addresses straight into the frontend.
fs_permissions = [{ access = "read-write", path = "../lib" }]

[rpc_endpoints]
mantle_sepolia = "https://rpc.sepolia.mantle.xyz"
